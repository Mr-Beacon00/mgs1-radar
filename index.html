<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MGS1 Radar</title>
    <link rel="stylesheet" href="radar.css"/>
	<script src="radar.js" defer></script>
</head>
<body>
    <div id="border">
		<img src="layers/layer.png" class="resizable-image" id="layer"/>
        <img src="layers/alert.png" class="resizable-image" id="banner"/>
		<div id="dotsBorder">
			<!-- <div id="limitLine"></div> -->
			<img src="layers/dots.png" id="dotsImg"/>
			<div id="brusher"></div>
		</div>
		<div id="numDiv1" style="position: absolute;">
			<img src="digits/9.png" class="resizable-image" id="digit1"/>
			<img src="digits/9.png" class="resizable-image" id="digit2"/>
		</div>
		<div id="numDiv2" style="position: absolute;">
			<img src="digits/9.png" class="resizable-image" id="digit3"/>
			<img src="digits/9.png" class="resizable-image" id="digit4"/>
		</div>
		<div id="timerNumDiv1" style="position: absolute;">
			<img src="warning_digits/9.png" class="resizable-image" id="timerDigit1"/>
			<img src="warning_digits/9.png" class="resizable-image" id="timerDigit2"/>
		</div>
		<div id="timerNumDiv2" style="position: absolute;">
			<img src="warning_digits/9.png" class="resizable-image" id="timerDigit3"/>
			<img src="warning_digits/9.png" class="resizable-image" id="timerDigit4"/>
		</div>
		<div id="timerNumDiv3" style="position: absolute;">
			<img src="warning_digits/ms9.png" class="resizable-image" id="timerDigit5"/>
			<img src="warning_digits/ms9.png" class="resizable-image" id="timerDigit6"/>
		</div>
		<div id="timerDotDiv" style="position: absolute;">
			<img src="warning_digits/dot.png" class="resizable-image" id="timerDot"/>
		</div>
    </div>
	
    <div id="controlPanel">
        <label for="sizeSelect">Change size:</label>
        <select id="sizeSelect">
			<option value="1">1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8" selected>8</option>
			<option value="9">9</option>
			<option value="10">10</option>
			<option value="11">11</option>
			<option value="12">12</option>
			<option value="13">13</option>
			<option value="14">14</option>
			<option value="15">15</option>
			<option value="16">16</option>
		</select>
		<br>
		<label for="typeSelect">Radar type:</label>
		<select id="typeSelect">
			<option value="0">0: None</option>
			<option value="1" selected>1: Jamming</option>
			<option value="2">2: Evasion</option>
			<option value="3">3: Alert</option>
		</select>
		<br>
		<label for="isJamming">Evasion back to Jamming:</label>
		<input type="checkbox" id="isJamming"/>
		<br>
		<label for="isJapanese">Japanese Version:</label>
		<input type="checkbox" id="isJapanese"/>
		<br>
		<label for="isWarning">Warning:</label>
		<input type="checkbox" id="isWarning"/>
		<br>
		<button onclick="dots_start()">dots start</button>
		<button onclick="dots_stop()">dots stop</button>
		<button onclick="dotsUpdate()">dots step</button>
		<br>

		<button onclick="bannerFlashStart()">banner flash start</button>
		<button onclick="bannerFlashStop()">banner flash stop</button>
		<button onclick="banner_step()">banner flash step</button>
		<br>
		<button onclick="number_countdown_start()">countdown start</button>
		<button onclick="number_countdown_step()">countdown step</button>
		<br>
		<button onclick="warning_countdown_start()">warning countdown start</button>
		<div>Code by Mr_Beacon00 (信标先生)</div>
    </div>
</body>
</html>
